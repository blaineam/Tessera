<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a2a"/>
      <stop offset="50%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0a1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent-soft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.08"/>
    </linearGradient>
    <linearGradient id="card-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(139,92,246,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(6,182,212,0.1)"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <clipPath id="rounded">
      <rect width="1200" height="630" rx="0"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>

    <!-- Ambient glow orbs -->
    <circle cx="200" cy="150" r="200" fill="#8b5cf6" opacity="0.08" filter="url(#blur1)"/>
    <circle cx="1000" cy="480" r="180" fill="#06b6d4" opacity="0.06" filter="url(#blur1)"/>
    <circle cx="600" cy="315" r="250" fill="#3b82f6" opacity="0.04" filter="url(#blur1)"/>

    <!-- Decorative grid pattern (subtle) -->
    <g opacity="0.03" stroke="white" stroke-width="0.5" fill="none">
      <line x1="0" y1="100" x2="1200" y2="100"/>
      <line x1="0" y1="200" x2="1200" y2="200"/>
      <line x1="0" y1="300" x2="1200" y2="300"/>
      <line x1="0" y1="400" x2="1200" y2="400"/>
      <line x1="0" y1="500" x2="1200" y2="500"/>
      <line x1="200" y1="0" x2="200" y2="630"/>
      <line x1="400" y1="0" x2="400" y2="630"/>
      <line x1="600" y1="0" x2="600" y2="630"/>
      <line x1="800" y1="0" x2="800" y2="630"/>
      <line x1="1000" y1="0" x2="1000" y2="630"/>
    </g>

    <!-- Floating mosaic tiles (tessera motif) -->
    <rect x="80" y="80" width="24" height="24" rx="4" fill="url(#accent)" opacity="0.15" transform="rotate(15 92 92)"/>
    <rect x="160" y="480" width="18" height="18" rx="3" fill="url(#accent)" opacity="0.12" transform="rotate(-10 169 489)"/>
    <rect x="1060" y="100" width="20" height="20" rx="4" fill="url(#accent)" opacity="0.18" transform="rotate(25 1070 110)"/>
    <rect x="1100" y="400" width="16" height="16" rx="3" fill="url(#accent)" opacity="0.1" transform="rotate(-20 1108 408)"/>
    <rect x="950" y="540" width="22" height="22" rx="4" fill="url(#accent)" opacity="0.13" transform="rotate(10 961 551)"/>
    <rect x="300" y="50" width="14" height="14" rx="2" fill="url(#accent)" opacity="0.1" transform="rotate(30 307 57)"/>

    <!-- Logo T mark -->
    <g transform="translate(100, 160)">
      <!-- T top bar -->
      <rect x="0" y="0" width="120" height="28" rx="6" fill="url(#accent)"/>
      <!-- T vertical -->
      <rect x="46" y="0" width="28" height="108" rx="6" fill="url(#accent)"/>
      <!-- Scattered tiles -->
      <rect x="0" y="40" width="12" height="12" rx="2" fill="url(#accent)" opacity="0.3"/>
      <rect x="108" y="40" width="12" height="12" rx="2" fill="url(#accent)" opacity="0.3"/>
      <rect x="14" y="64" width="8" height="8" rx="1.5" fill="url(#accent)" opacity="0.2"/>
      <rect x="98" y="64" width="8" height="8" rx="1.5" fill="url(#accent)" opacity="0.2"/>
    </g>

    <!-- Brand name -->
    <text x="260" y="245" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif" font-size="72" font-weight="700" fill="url(#accent)">Tessera</text>

    <!-- Tagline -->
    <text x="262" y="295" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', sans-serif" font-size="26" font-weight="400" fill="rgba(240,240,248,0.7)">Cryptographic App Licensing for macOS</text>

    <!-- Feature pills -->
    <g transform="translate(262, 340)">
      <!-- Pill 1 -->
      <rect x="0" y="0" width="180" height="36" rx="18" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)" stroke-width="1"/>
      <text x="90" y="23" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13" font-weight="500" fill="rgba(240,240,248,0.75)">Ed25519 Signatures</text>

      <!-- Pill 2 -->
      <rect x="196" y="0" width="172" height="36" rx="18" fill="rgba(59,130,246,0.12)" stroke="rgba(59,130,246,0.25)" stroke-width="1"/>
      <text x="282" y="23" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13" font-weight="500" fill="rgba(240,240,248,0.75)">Device Seat Limiting</text>

      <!-- Pill 3 -->
      <rect x="384" y="0" width="140" height="36" rx="18" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.25)" stroke-width="1"/>
      <text x="454" y="23" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13" font-weight="500" fill="rgba(240,240,248,0.75)">Zero Tracking</text>

      <!-- Pill 4 -->
      <rect x="540" y="0" width="190" height="36" rx="18" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.18)" stroke-width="1"/>
      <text x="635" y="23" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="13" font-weight="500" fill="rgba(240,240,248,0.6)">Stripe Subscriptions</text>
    </g>

    <!-- Code snippet preview (glass card) -->
    <g transform="translate(262, 410)">
      <rect x="0" y="0" width="660" height="140" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
      <!-- Window dots -->
      <circle cx="20" cy="18" r="4" fill="#ff5f57"/>
      <circle cx="34" cy="18" r="4" fill="#ffbd2e"/>
      <circle cx="48" cy="18" r="4" fill="#28c840"/>
      <!-- Code -->
      <text x="20" y="56" font-family="'SF Mono', Menlo, Monaco, monospace" font-size="13" fill="rgba(139,92,246,0.9)">import <tspan fill="rgba(240,240,248,0.85)">Tessera</tspan></text>
      <text x="20" y="80" font-family="'SF Mono', Menlo, Monaco, monospace" font-size="13" fill="rgba(240,240,248,0.4)">// One line to gate your app:</text>
      <text x="20" y="104" font-family="'SF Mono', Menlo, Monaco, monospace" font-size="13" fill="rgba(240,240,248,0.85)">ContentView()<tspan fill="rgba(6,182,212,0.9)">.tesseraGate</tspan>(tessera)</text>
      <text x="20" y="128" font-family="'SF Mono', Menlo, Monaco, monospace" font-size="13" fill="rgba(240,240,248,0.4)">// That's it. Unforgeable. Offline. Free.</text>
    </g>

    <!-- Bottom domain -->
    <text x="100" y="590" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="16" font-weight="500" fill="rgba(240,240,248,0.3)">tessera.wemiller.com</text>

    <!-- Bottom right: open source badge -->
    <g transform="translate(1010, 572)">
      <rect x="0" y="0" width="100" height="28" rx="14" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.2)" stroke-width="1"/>
      <text x="50" y="19" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif" font-size="12" font-weight="500" fill="rgba(139,92,246,0.8)">MIT License</text>
    </g>
  </g>
</svg>
