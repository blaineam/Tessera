<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a103a"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle glow -->
  <circle cx="256" cy="240" r="160" fill="url(#glow)"/>
  <!-- Tessera "T" mark built from mosaic tiles (tessera = Roman mosaic tile) -->
  <!-- Top bar of T -->
  <rect x="116" y="128" width="280" height="64" rx="12" fill="url(#accent)"/>
  <!-- Vertical bar of T -->
  <rect x="224" y="128" width="64" height="256" rx="12" fill="url(#accent)"/>
  <!-- Small mosaic tiles scattered around the T -->
  <rect x="116" y="216" width="28" height="28" rx="4" fill="url(#accent)" opacity="0.35"/>
  <rect x="156" y="260" width="20" height="20" rx="3" fill="url(#accent)" opacity="0.2"/>
  <rect x="368" y="216" width="28" height="28" rx="4" fill="url(#accent)" opacity="0.35"/>
  <rect x="336" y="260" width="20" height="20" rx="3" fill="url(#accent)" opacity="0.2"/>
  <rect x="132" y="310" width="16" height="16" rx="3" fill="url(#accent)" opacity="0.15"/>
  <rect x="364" y="310" width="16" height="16" rx="3" fill="url(#accent)" opacity="0.15"/>
  <rect x="148" y="356" width="12" height="12" rx="2" fill="url(#accent)" opacity="0.1"/>
  <rect x="352" y="356" width="12" height="12" rx="2" fill="url(#accent)" opacity="0.1"/>
</svg>
