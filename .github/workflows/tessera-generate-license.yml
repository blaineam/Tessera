name: "Tessera: Generate License"

on:
  workflow_dispatch:
    inputs:
      app:
        description: "App to generate the license for"
        required: true
        type: choice
        options:
          - ari
      tier:
        description: "License tier"
        required: true
        type: choice
        options:
          - personal
          - pro
          - team
      duration_days:
        description: "Duration in days (0 = perpetual)"
        required: true
        type: choice
        options:
          - "30"
          - "180"
          - "365"
          - "0"
      features:
        description: "Feature flags (integer)"
        required: false
        default: "0"
        type: string
      nickname:
        description: "Friendly name for this license"
        required: false
        default: ""
        type: string
      customer_email:
        description: "Customer email (for delivery — leave blank to skip)"
        required: false
        default: ""
        type: string
      stripe_session_id:
        description: "Stripe session ID (auto-filled by webhook worker)"
        required: false
        default: ""
        type: string
      stripe_customer_id:
        description: "Stripe customer ID (auto-filled by webhook worker)"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  generate-license:
    runs-on: ubuntu-latest
    # Pass all inputs via environment variables to prevent script injection
    env:
      INPUT_APP: ${{ inputs.app }}
      INPUT_TIER: ${{ inputs.tier }}
      INPUT_DURATION_DAYS: ${{ inputs.duration_days }}
      INPUT_FEATURES: ${{ inputs.features }}
      INPUT_NICKNAME: ${{ inputs.nickname }}
      INPUT_CUSTOMER_EMAIL: ${{ inputs.customer_email }}
      INPUT_STRIPE_SESSION_ID: ${{ inputs.stripe_session_id }}
      INPUT_STRIPE_CUSTOMER_ID: ${{ inputs.stripe_customer_id }}
    steps:
      - name: Validate inputs
        run: |
          # Validate features is a non-negative integer
          if ! echo "$INPUT_FEATURES" | grep -qE '^[0-9]+$'; then
            echo "::error::features must be a non-negative integer, got: $INPUT_FEATURES"
            exit 1
          fi
          # Validate duration_days is a non-negative integer
          if ! echo "$INPUT_DURATION_DAYS" | grep -qE '^[0-9]+$'; then
            echo "::error::duration_days must be a non-negative integer"
            exit 1
          fi
          # Validate nickname doesn't contain dangerous characters
          if echo "$INPUT_NICKNAME" | grep -qE '["`$\\]'; then
            echo "::error::nickname contains disallowed characters"
            exit 1
          fi
          # Validate Stripe customer ID format (if provided) to prevent URL injection
          if [ -n "$INPUT_STRIPE_CUSTOMER_ID" ]; then
            if ! echo "$INPUT_STRIPE_CUSTOMER_ID" | grep -qE '^cus_[A-Za-z0-9]+$'; then
              echo "::error::stripe_customer_id has invalid format"
              exit 1
            fi
          fi

      - name: Checkout this repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install -r Tools/requirements.txt

      - name: Resolve per-app private key
        id: appconfig
        run: |
          APP="$INPUT_APP"
          # Map app name to uppercase for secret lookup
          APP_UPPER=$(echo "$APP" | tr '[:lower:]-' '[:upper:]_')

          # Data path is always Site/apps/<app>/licensing within this repo
          echo "data_path=Site/apps/${APP}/licensing" >> "$GITHUB_OUTPUT"
          echo "app_upper=${APP_UPPER}" >> "$GITHUB_OUTPUT"

      - name: Write private key to temp file
        env:
          KEY_APP_SPECIFIC: ${{ secrets[format('TESSERA_PRIVATE_KEY_{0}', steps.appconfig.outputs.app_upper)] }}
          KEY_SHARED: ${{ secrets.TESSERA_PRIVATE_KEY }}
        run: |
          TMPKEY="$(mktemp)"
          KEY_VALUE="${KEY_APP_SPECIFIC}"
          if [ -z "$KEY_VALUE" ]; then
            KEY_VALUE="${KEY_SHARED}"
          fi
          if [ -z "$KEY_VALUE" ]; then
            echo "::error::No private key found for app '$INPUT_APP'. Set TESSERA_PRIVATE_KEY_${{ steps.appconfig.outputs.app_upper }} or TESSERA_PRIVATE_KEY in repo secrets."
            exit 1
          fi
          echo "$KEY_VALUE" > "$TMPKEY"
          chmod 600 "$TMPKEY"
          echo "TMPKEY=$TMPKEY" >> "$GITHUB_ENV"

      - name: Generate license key
        id: generate
        run: |
          if [ "$INPUT_DURATION_DAYS" = "0" ]; then
            GENERATE_ARGS="--perpetual"
          else
            GENERATE_ARGS="--duration $INPUT_DURATION_DAYS"
          fi

          OUTPUT=$(python3 Tools/tessera_cli.py generate \
            --private-key "$TMPKEY" \
            --tier "$INPUT_TIER" \
            --features "$INPUT_FEATURES" \
            $GENERATE_ARGS)

          LICENSE_KEY=$(echo "$OUTPUT" | grep "^License Key:" | sed 's/^License Key: *//')
          LICENSE_ID=$(echo "$OUTPUT" | grep "^License ID:" | sed 's/^License ID: *//')

          # Mask the license key so it never appears in logs
          echo "::add-mask::$LICENSE_KEY"

          echo "license_key=$LICENSE_KEY" >> "$GITHUB_OUTPUT"
          echo "license_id=$LICENSE_ID" >> "$GITHUB_OUTPUT"

      - name: Update licenses.json
        env:
          LICENSE_ID: ${{ steps.generate.outputs.license_id }}
        run: |
          LICENSES_FILE="${{ steps.appconfig.outputs.data_path }}/licenses.json"

          if [ ! -f "$LICENSES_FILE" ]; then
            mkdir -p "$(dirname "$LICENSES_FILE")"
            echo '{"licenses":[],"updated":""}' > "$LICENSES_FILE"
          fi

          python3 - "$LICENSES_FILE" <<'PYEOF'
          import json, sys, time, os

          licenses_file = sys.argv[1]
          now = int(time.time())
          duration_days = int(os.environ["INPUT_DURATION_DAYS"])
          tier = os.environ["INPUT_TIER"]
          license_id = os.environ["LICENSE_ID"]
          stripe_session_id = os.environ["INPUT_STRIPE_SESSION_ID"]

          with open(licenses_file, "r") as f:
              data = json.load(f)
          if isinstance(data, list):
              data = {"licenses": data, "updated": ""}

          expires = "perpetual" if duration_days == 0 else \
              time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime(now + duration_days * 86400))

          interval = "yearly" if duration_days >= 365 else ("monthly" if duration_days <= 35 else "custom")

          entry = {
              "lid": license_id,
              "tier": tier,
              "issued": time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime(now)),
              "expires": expires,
              "subscription": {
                  "active": bool(stripe_session_id),
                  "interval": interval,
                  "next_renewal": expires
              },
              "revoked": False,
          }

          data["licenses"].append(entry)
          data["updated"] = time.strftime("%Y-%m-%dT%H:%M:%SZ", time.gmtime(now))

          with open(licenses_file, "w") as f:
              json.dump(data, f, indent=2)
          PYEOF

      - name: Commit and push license update
        run: |
          git config user.name "tessera[bot]"
          git config user.email "tessera[bot]@users.noreply.github.com"
          git add "${{ steps.appconfig.outputs.data_path }}/licenses.json"
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Tessera: add $INPUT_TIER license for $INPUT_APP (${{ steps.generate.outputs.license_id }})"
          git push

      - name: Send license via email
        if: env.INPUT_CUSTOMER_EMAIL != ''
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "Your License Key"
          to: ${{ inputs.customer_email }}
          from: ${{ secrets.SMTP_FROM || 'noreply@example.com' }}
          body: |
            Thank you for your purchase!

            Your license key:

            ${{ steps.generate.outputs.license_key }}

            To activate:
            1. Open the app
            2. Paste the key above into the activation screen
            3. Click "Activate License"

            This key is tied to your purchase and can be re-used if you reinstall.

            ---
            Powered by Tessera

      - name: Update Stripe metadata with license ID
        if: env.INPUT_STRIPE_CUSTOMER_ID != ''
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          if [ -n "$STRIPE_SECRET_KEY" ]; then
            curl -s -X POST "https://api.stripe.com/v1/customers/$INPUT_STRIPE_CUSTOMER_ID" \
              -u "$STRIPE_SECRET_KEY:" \
              -d "metadata[tessera_license_id]=${{ steps.generate.outputs.license_id }}" \
              -d "metadata[tessera_tier]=$INPUT_TIER" || true
          fi

      - name: Write summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Tessera License Generated

          | Field | Value |
          |-------|-------|
          | **App** | $INPUT_APP |
          | **License ID** | \`${{ steps.generate.outputs.license_id }}\` |
          | **Tier** | $INPUT_TIER |
          | **Duration** | ${INPUT_DURATION_DAYS} days |
          | **Features** | $INPUT_FEATURES |
          | **Nickname** | $INPUT_NICKNAME |

          > License key was delivered via email (if configured) and masked from logs.
          EOF

      - name: Clean up private key
        if: always()
        run: |
          if [ -n "$TMPKEY" ] && [ -f "$TMPKEY" ]; then
            shred -u "$TMPKEY" 2>/dev/null || rm -f "$TMPKEY"
          fi
